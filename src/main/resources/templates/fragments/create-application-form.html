<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <form action="/add-application" method="post">

                <!-- ФИО -->
                <div class="mb-3">
                    <label class="form-label">ФИО :</label>
                    <input type="text"
                           class="form-control"
                           name="userName"
                           placeholder="ФИО"
                           required>
                </div>

                <!-- Курс -->
                <div class="mb-3">
                    <label class="form-label">Курс :</label>
                    <select class="form-select" name="courseName" required>
                        <option value="">Выберите курс</option>
                        <option value="Java Standard Edition">Java Standard Edition</option>
                        <option value="Java Pro">Java Pro</option>
                        <option value="Web Technologies">Web Technologies</option>
                        <option value="Python Programming Language">Python Programming Language</option>
                        <option value="UX/UI Design">UX/UI Design</option>
                        <option value="Django Framework">Django Framework</option>
                    </select>
                </div>

                <!-- Телефон -->
                <div class="mb-3">
                    <label class="form-label">Телефон :</label>
                    <input type="text"
                           class="form-control"
                           name="phone"
                           placeholder="+7(7__)_______"
                           required>
                </div>

                <!-- Комментарий -->
                <div class="mb-3">
                    <label class="form-label">Комментарии :</label>
                    <textarea class="form-control"
                              name="commentary"
                              rows="4"
                              placeholder="Комментарии"></textarea>
                </div>

                <!-- Кнопка -->
                <button type="submit" class="btn btn-success">
                    Добавить заявку
                </button>

            </form>

        </div>
    </div>
</div>
