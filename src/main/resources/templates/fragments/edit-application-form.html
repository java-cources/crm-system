<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <form action="/applications/update" method="post" th:object="${application}">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
          <label class="form-label">ФИО :</label>
          <input type="text"
                 class="form-control"
                 th:field="*{userName}"
                 placeholder="ФИО"
                 required>
        </div>

        <div class="mb-3">
          <label class="form-label">Курс :</label>
          <select class="form-select" th:field="*{courseId}" required>
            <option th:each="course : ${courses}"
                    th:value="${course.id}"
                    th:text="${course.name + ' - ' + course.price}">
            </option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Телефон :</label>
          <input type="text"
                 class="form-control"
                 th:field="*{phone}"
                 placeholder="+7(7__)_______"
                 required>
        </div>

        <div class="mb-3">
          <label class="form-label">Комментарии :</label>
          <textarea class="form-control"
                    th:field="*{commentary}"
                    rows="4"
                    placeholder="Комментарии"></textarea>
        </div>

        <div class="form-check mb-4">
          <input class="form-check-input"
                 type="checkbox"
                 th:field="*{handled}"
                 id="handled">
          <label class="form-check-label" for="handled">
            Обработана
          </label>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">
            Сохранить изменения
          </button>
        </div>
      </form>

      <form action="/applications/delete"
            method="post"
            class="mt-3"
            th:object="${application}"
      >
        <input type="hidden" name="id" th:field="*{id}">

        <button type="submit"
                class="btn btn-danger"
                onclick="return confirm('Вы уверены, что хотите удалить заявку?');">
          Удалить заявку
        </button>
      </form>

    </div>
  </div>
</div>
